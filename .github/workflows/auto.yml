name: Auto-Maintain
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
jobs:
  update:
    runs-on:ubuntu-latest
    permissions:
      contents:write
    steps:
      -uses:actions/checkout@v4
        with:
          token:${{secrets.GH_PAT}}
          fetch-depth:0
      -name:Update
        run:|
          if [ -f README.md ];then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add README.md
            git commit -m 'auto-maintain' --allow-empty 2>/dev/null||true
            git push 2>/dev/null||true
          fi